    <script>
          //Meaning:
            // Create a function named sendMessage 
             // It runs when user clicks Send button

            // 👉 this function can wait for API response from backend.
         async function sendMessage(){
            let input = document.getElementById("message");
            let message = input.value;
            let chatBox = document.getElementById("chat-box");

            //user message
            chatBox.innerHTML += `<div class="user">${message}</div>`;
            // sending message to FastAPI backend
            // fetch() => is the bridge between frontend and backend:
            let response = await fetch(
                "http://127.0.0.1:8000/chat",
                {
                    method : "POST",
                    headers :{
                        "content-type" : "application/json"
                    },
                    //Converts JavaScript object into JSON.
                    body: JSON.stringify({
                        message : message
                    })
                }
            );
            //This line converts JSON response into JavaScript object   
            let data = await response.json();
            // bot response: Adds bot message into chat window.
            chatBox.innerHTML += `<div class = "bot">${data.response}</div>`;

            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
            //Automatically scrolls chat to latest message.
            //Without this:
            //new messages may appear below invisible area
        } 
    </script>
